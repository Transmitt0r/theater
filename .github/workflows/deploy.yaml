name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Note: GitHub Pages PR preview deployments via deploy-pages `preview: true` are not generally available yet.
  # We validate PR builds here and only deploy to production from main/workflow_dispatch.
  build-preview-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site (PR validation)
        run: npm run build
        env:
          BASE_PATH: /theater

  build-main:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site (production)
        run: npm run build
        env:
          BASE_PATH: /theater

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy-main:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-main
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.production_deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (production)
        id: production_deploy
        uses: actions/deploy-pages@v4
